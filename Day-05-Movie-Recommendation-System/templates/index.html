<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Movie Recommendation System</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:linear-gradient(
        135deg,
        #141e30,
        #243b55
    );
}

.container{

    width:600px;

    background:white;

    padding:40px;

    border-radius:20px;

    text-align:center;

    box-shadow:0px 10px 30px rgba(0,0,0,0.3);
}

h1{

    margin-bottom:20px;

    color:#243b55;
}

input{

    width:100%;

    padding:15px;

    border:1px solid #ccc;

    border-radius:10px;

    margin-top:15px;

    font-size:16px;
}

button{

    width:100%;

    margin-top:20px;

    padding:15px;

    border:none;

    border-radius:10px;

    background:#243b55;

    color:white;

    font-size:16px;

    cursor:pointer;

    transition:0.3s;
}

button:hover{

    background:#141e30;
}

.result{

    margin-top:25px;

    text-align:left;
}

.result h2{

    color:#243b55;

    margin-bottom:10px;
}

.result ul{

    list-style:none;
}

.result li{

    background:#f4f4f4;

    padding:12px;

    margin-bottom:10px;

    border-radius:8px;
}

</style>

</head>

<body>

<div class="container">

<h1>🎬 Movie Recommendation System</h1>

<form action="/recommend" method="post">

<input
type="text"
name="movie"
placeholder="Enter Movie Name"
required>

<button type="submit">

Get Recommendations

</button>

</form>

{% if recommendations %}

<div class="result">

<h2>Recommended Movies</h2>

<ul>

{% for movie in recommendations %}

<li>{{ movie }}</li>

{% endfor %}

</ul>

</div>

{% endif %}

</div>

</body>
</html>
