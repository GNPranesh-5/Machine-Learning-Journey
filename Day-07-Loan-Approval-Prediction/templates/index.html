<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Loan Approval Predictor</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:linear-gradient(
        135deg,
        #0f2027,
        #203a43,
        #2c5364
    );
}

.container{

    width:500px;

    background:white;

    padding:40px;

    border-radius:20px;

    box-shadow:0px 15px 35px rgba(0,0,0,0.3);

    text-align:center;

    animation:fadeIn 0.8s ease;
}

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

h1{

    color:#2c5364;

    margin-bottom:25px;
}

input{

    width:100%;

    padding:15px;

    margin:12px 0;

    border:1px solid #ddd;

    border-radius:10px;

    font-size:16px;

    transition:0.3s;
}

input:focus{

    outline:none;

    border-color:#2c5364;

    box-shadow:0 0 10px rgba(44,83,100,0.2);
}

button{

    width:100%;

    padding:15px;

    margin-top:15px;

    border:none;

    border-radius:10px;

    background:#2c5364;

    color:white;

    font-size:17px;

    cursor:pointer;

    transition:0.3s;
}

button:hover{

    background:#1b3742;

    transform:translateY(-2px);
}

.result{

    margin-top:25px;

    padding:15px;

    border-radius:10px;

    background:#f4f4f4;

    font-size:22px;

    font-weight:bold;
}

.footer{

    margin-top:20px;

    font-size:13px;

    color:#777;
}

</style>

</head>

<body>

<div class="container">

    <h1>🏦 Loan Approval Predictor</h1>

    <form action="/predict" method="post">

        <input
        type="number"
        name="income"
        placeholder="Enter Income"
        required>

        <input
        type="number"
        name="credit_score"
        placeholder="Enter Credit Score"
        required>

        <input
        type="number"
        name="loan_amount"
        placeholder="Enter Loan Amount"
        required>

        <button type="submit">

            Predict Loan Status

        </button>

    </form>

    {% if result %}

    <div class="result">

        {{ result }}

    </div>

    {% endif %}

    <div class="footer">

        Machine Learning Project - Day 7

    </div>

</div>

</body>
</html>
