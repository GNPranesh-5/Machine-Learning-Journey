<!DOCTYPE html>
<html>
<head>

<title>Fake News Detection</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{

    background:linear-gradient(
        135deg,
        #232526,
        #414345
    );

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;
}

.container{

    width:700px;

    background:white;

    padding:40px;

    border-radius:20px;

    box-shadow:0 10px 30px rgba(0,0,0,0.3);

    text-align:center;
}

h1{

    margin-bottom:20px;
}

textarea{

    width:100%;

    height:150px;

    padding:15px;

    border-radius:10px;

    border:1px solid #ccc;

    resize:none;

    font-size:15px;
}

button{

    width:100%;

    padding:15px;

    margin-top:15px;

    border:none;

    border-radius:10px;

    background:#232526;

    color:white;

    cursor:pointer;

    font-size:16px;
}

button:hover{

    background:#111;
}

.result{

    margin-top:20px;

    padding:15px;

    border-radius:10px;

    background:#f4f4f4;

    font-size:20px;

    font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h1>📰 Fake News Detection</h1>

<form action="/predict" method="post">

<textarea
name="news"
placeholder="Enter News Article..."
required></textarea>

<button type="submit">

Check News

</button>

</form>

{% if prediction %}

<div class="result">

Prediction:
{{ prediction }}

</div>

{% endif %}

</div>

</body>

</html>
