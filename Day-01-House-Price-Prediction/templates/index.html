<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Price Prediction</title>
    <style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
    }
    body{
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(
            135deg,
            #4facfe,
            #00f2fe
        );
    }
    .card{
        background: white;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0px 10px 25px rgba(0, 0, 0, 0.2);
        width: 400px;
        text-align: center;
    }
    h1{
        margin-bottom: 25px;
        color: #333;
    }
    label{
        display: flex;
        text-align: left;
        margin-top: 15px;
        font-weight: bold;
    }
    input{
        width: 100%;
        padding: 12px;
        margin-top: 8px;
        border:1px solid #ccc;
        border-radius: 10px;
        font-size: 16px;
    }
    button{
        width: 100%;
        padding: 14px;
        margin-top: 25px;
        border: none;
        border-radius: 10px;
        background: #4facfe;
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }
    button:hover{
        background: #0077ff;
    }
    .result{
        margin-top: 20px;
        padding: 15px;
        background: #e8f5e9;
        border-radius: 10px;
        color: #2e7d32;
        font-weight: bold;
        font-size: 20px;
    }
    </style>
</head>
<body>
    <link rel="stylesheet" href="style.css">
    <div class="card">
    <h1>House Price Prediction</h1>
    <form action="/predict" method="post">
        <label>House Size:</label>
        <input type="number" name="size" required>
        <br><br>
        <label>Bedrooms</label>
        <input type="number" name="bedrooms" required>
        <br><br>
        <button type="submit">
            Predict Price
        </button>
    </form>
    {% if prediction %}
    <div class="result">
        Predicted Price: {{prediction}} Lakhs
    </div>
    {% endif %}
    </div>
</body>
</html>
