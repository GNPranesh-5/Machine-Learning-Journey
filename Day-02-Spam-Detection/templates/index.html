<!DOCTYPE html>
<html>
<head>

<title>Spam Detection System</title>

<style>

body{
    font-family:Arial;
    background:linear-gradient(
        135deg,
        #667eea,
        #764ba2
    );

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;
}

.card{

    background:white;

    width:500px;

    padding:30px;

    border-radius:20px;

    text-align:center;

    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

textarea{

    width:100%;

    height:120px;

    padding:10px;

    margin-top:15px;

    border-radius:10px;
}

button{

    margin-top:15px;

    padding:12px 25px;

    border:none;

    border-radius:10px;

    background:#667eea;

    color:white;

    cursor:pointer;
}

.result{

    margin-top:20px;

    font-size:22px;

    font-weight:bold;
}

</style>

</head>

<body>

<div class="card">

<h1>Spam Detection System</h1>

<form action="/predict" method="post">

<textarea
name="message"
placeholder="Enter message..."
required></textarea>

<br>

<button type="submit">

Check Message

</button>

</form>

{% if prediction %}

<div class="result">

Prediction:

{{ prediction }}

</div>

{% endif %}

</div>

</body>
</html>
